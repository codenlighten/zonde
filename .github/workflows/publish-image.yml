name: Publish image

# Build and push the multi-arch container image to GHCR on version tags.
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

env:
  ZIG_VERSION: 0.16.0

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io/<owner>/<repo>
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      # Cross-compile the static musl binaries the Dockerfile picks from
      # (also runs the 2 MiB size gate before we ship anything).
      - name: Build release binaries
        run: zig build release

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
